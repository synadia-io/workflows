name: Java Standard Main Snapshot Build

on:
  workflow_call:
    inputs:
      project-dir:
        description: 'path for a project in a subdirectory'
        required: false
        type: string
      coverage:
        description: 'true if should run coverage steps'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./${{ inputs.project-dir }}
    env:
      BUILD_EVENT: ${{ github.event_name }}
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install Nats Server
        uses: ./.github/actions/install_nats_server
      - name: Compile and Test
        run: |
          chmod +x gradlew && ./gradlew clean test
      - name: Verify Javadoc
        run: |
          ./gradlew javadoc
      - name: Run Jacoco Test Report
        if: ${{ inputs.coverage }}
        run: |
          ./gradlew jacocoTestReport
      - name: Send coverage to Coveralls
        if: ${{ inputs.coverage }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
      - name: Publish Snapshot
        run: |
          ./gradlew -i publishToSonatype
      - name: Shutdown Nats Servers
        if: always()
        run: pkill -9 nats-server 2>/dev/null || true
