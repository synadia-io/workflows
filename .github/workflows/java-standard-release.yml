name: Java Standard Release Build

on:
  workflow_call:
    inputs:
      project-dir:
        description: 'path for a project in a subdirectory'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./${{ inputs.project-dir }}
    env:
      BUILD_EVENT: "release"
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install Nats Server
        uses: ./.github/actions/install_nats_server
      - name: Compile and Test
        run: |
          chmod +x gradlew && ./gradlew clean test
      - name: Verify, Sign and Publish Release
        run: |
          ./gradlew -i publishToSonatype closeAndReleaseSonatypeStagingRepository
      - name: Shutdown Nats Servers
        if: always()
        run: pkill -9 nats-server 2>/dev/null || true
